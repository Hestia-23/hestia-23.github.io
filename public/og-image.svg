  <defs>
    <radialGradient id="warm" cx="80%" cy="110%" r="60%">
      <stop offset="0%" stop-color="#e0a58a" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#e0a58a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="15%" cy="-10%" r="60%">
      <stop offset="0%" stop-color="#b8ccd4" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#b8ccd4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0c2833"/>
  <rect width="1200" height="630" fill="url(#warm)"/>
  <rect width="1200" height="630" fill="url(#cool)"/>

  <!-- inner border -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#1f3c47" stroke-width="1"/>

  <!-- center vertical hairline -->
  <line x1="600" y1="72" x2="600" y2="558" stroke="#1f3c47" stroke-width="1"/>

  <!-- left: wordmark + tagline (vertically centered around y=315) -->
  <g font-family="'EB Garamond', 'Hoefler Text', Garamond, serif" fill="#e6eef0">
    <text x="96" y="290" font-size="168" letter-spacing="-5">hestia</text>
  </g>
  <g font-family="'EB Garamond', 'Hoefler Text', Garamond, serif" font-style="italic" font-size="36" fill="#9cb2b9">
    <text x="96" y="370">
      <tspan x="96" dy="0">Frontend developer.</tspan>
      <tspan x="96" dy="46">UI components, layouts, and</tspan>
      <tspan x="96" dy="46">design systems, built with</tspan>
      <tspan x="96" dy="46">care and no shortcuts.</tspan>
    </text>
  </g>

  <!-- right: shrine artwork, scaled and right-aligned at top:40% -->
  <!-- shrine viewBox 0 0 94 40, target 660x220 (xMaxYMid meet) -->
  <!-- top:40% of 630 = 252, translateY -50% of 220 = -110, so shrine top = 142, bottom = 362 -->
  <!-- right edge = 1200-96 = 1104; left edge = 1104-660 = 444 -->
  <!-- with xMaxYMid meet on viewBox 94x40 in 660x220 box: scale = 220/40 = 5.5; content w = 94*5.5 = 517; offset from box left = 660-517 = 143 -->
  <g transform="translate(587 142) scale(5.5)" shape-rendering="crispEdges">
    <!-- left pillar -->
    <g transform="translate(4 0)">
      <rect fill="#9cb2b9" x="23" y="6"  width="11" height="2"/>
      <rect fill="#6a848d" x="24" y="8"  width="9"  height="1"/>
      <rect fill="#6a848d" x="25" y="9"  width="7"  height="26"/>
      <rect fill="#3f5560" x="26" y="9"  width="1"  height="26"/>
      <rect fill="#3f5560" x="28" y="9"  width="1"  height="26"/>
      <rect fill="#3f5560" x="30" y="9"  width="1"  height="26"/>
      <rect fill="#6a848d" x="24" y="35" width="9"  height="1"/>
      <rect fill="#9cb2b9" x="23" y="36" width="11" height="2"/>
    </g>

    <!-- right pillar -->
    <g transform="translate(-4 0)">
      <rect fill="#9cb2b9" x="87" y="6"  width="11" height="2"/>
      <rect fill="#6a848d" x="88" y="8"  width="9"  height="1"/>
