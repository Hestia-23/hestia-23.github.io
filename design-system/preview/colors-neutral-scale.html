<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; display:flex; flex-direction:column; gap:16px; }
  .card-label { font-family: var(--font-body); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--fg-subtle); }
  .scale { display:flex; gap:0; border:1px solid var(--rule); border-radius:2px; overflow:hidden; }
  .step { flex:1; padding: 16px 10px; display:flex; flex-direction:column; gap:4px; }
  .step .n { font-size:11px; font-weight:500; }
  .step .h { font-size:10px; font-family:var(--font-mono); opacity:.7; }
</style>
</head>
<body>
  <div class="card-label">Marble — neutral ground (50–400)</div>
  <div class="scale">
    <div class="step" style="background:#faf8f3; color:#2a2620"><span class="n">50</span><span class="h">#faf8f3</span></div>
    <div class="step" style="background:#f4f1ea; color:#2a2620"><span class="n">100</span><span class="h">#f4f1ea</span></div>
    <div class="step" style="background:#ebe6db; color:#2a2620"><span class="n">200</span><span class="h">#ebe6db</span></div>
    <div class="step" style="background:#ddd5c5; color:#2a2620"><span class="n">300</span><span class="h">#ddd5c5</span></div>
    <div class="step" style="background:#c5baa4; color:#2a2620"><span class="n">400</span><span class="h">#c5baa4</span></div>
  </div>
  <div class="card-label">Stone / charcoal — text and ink (500–950)</div>
  <div class="scale">
    <div class="step" style="background:#8a8274; color:#faf8f3"><span class="n">stone-500</span><span class="h">#8a8274</span></div>
    <div class="step" style="background:#4f4a41; color:#faf8f3"><span class="n">stone-700</span><span class="h">#4f4a41</span></div>
    <div class="step" style="background:#2a2620; color:#faf8f3"><span class="n">charcoal-900</span><span class="h">#2a2620</span></div>
    <div class="step" style="background:#1a1714; color:#faf8f3"><span class="n">charcoal-950</span><span class="h">#1a1714</span></div>
  </div>
</body>
</html>
