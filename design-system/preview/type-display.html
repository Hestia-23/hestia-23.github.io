<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 10px 0; border-bottom: 1px solid var(--rule); }
  .row:last-child { border-bottom: 0; }
  .label { width: 110px; flex-shrink:0; font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
  .sample { font-family: var(--font-display); color: var(--fg); line-height: 1; letter-spacing: -0.01em; }
</style>
</head>
<body>
  <div class="row"><div class="label">step-7 · 96px</div><div class="sample" style="font-size:64px; font-style:italic; font-weight:500">hestia</div></div>
  <div class="row"><div class="label">step-5 · 48px · h1</div><div class="sample" style="font-size:42px">selected work</div></div>
  <div class="row"><div class="label">step-4 · 36px · h2</div><div class="sample" style="font-size:32px">about</div></div>
  <div class="row"><div class="label">step-3 · 28px · h3</div><div class="sample" style="font-size:26px; font-style:italic">privacypack</div></div>
</body>
</html>
