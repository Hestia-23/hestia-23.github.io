<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css?v=4">
<style>
  body { padding: 26px 30px; display:flex; flex-direction: column; gap: 16px; }
  .tag-label { font-family: var(--font-body); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-subtle); margin-bottom: 8px; }
  .row { display:flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .t { font-family: var(--font-body); font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 2px; border: 1px solid var(--rule); background: var(--bg); color: var(--fg-muted); text-transform: lowercase; letter-spacing: 0.02em; }
  .t.accent { color: var(--accent); border-color: var(--accent-wash); }
  .t.secondary { color: var(--secondary); border-color: #b3b396; }
  .t.wip { color: var(--secondary-hover); background: #eeeedf; border-color: #c9c9aa; }
  .meta-sep { font-family: var(--font-body); font-size: 13px; color: var(--fg-subtle); }
  .note { font-family: var(--font-display); font-style: italic; font-size: 12px; color: var(--fg-subtle); }
</style>
</head>
<body>
  <div>
    <div class="tag-label">Tags — hairline, lowercase, restrained</div>
    <div class="row">
      <span class="t">astro</span>
      <span class="t">typescript</span>
      <span class="t">vanilla css</span>
      <span class="t accent">active · aegean</span>
      <span class="t secondary">archived · sage</span>
      <span class="t wip">work in progress</span>
    </div>
    <div class="note" style="margin-top:10px">terracotta ember is never a tag color — it would read as a status when it isn't one.</div>
  </div>
  <div>
    <div class="tag-label">Metadata row — middle-dot separators, no icons</div>
    <div class="row">
      <span style="font-family:var(--font-body); font-size:13px; color:var(--fg-muted)">astro</span>
      <span class="meta-sep">·</span>
      <span style="font-family:var(--font-body); font-size:13px; color:var(--fg-muted)">typescript</span>
      <span class="meta-sep">·</span>
      <span style="font-family:var(--font-body); font-size:13px; color:var(--fg-muted)">github pages</span>
      <span class="meta-sep">·</span>
      <span style="font-family:var(--font-display); font-style:italic; font-size:13px; color:var(--fg-subtle)">april 2026</span>
    </div>
  </div>
</body>
</html>
