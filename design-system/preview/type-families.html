<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; display: flex; gap: 28px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 10px; padding-right: 28px; border-right: 1px solid var(--rule); }
  .col:last-child { border-right: 0; padding-right: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: 0.12em; }
  .name { font-size: 34px; line-height: 1; }
  .meta { font-size: 12px; color: var(--fg-muted); }
  .specimen { color: var(--fg); margin-top: 4px; }
</style>
</head>
<body>
  <div class="col">
    <div class="tag">display · serif</div>
    <div class="name" style="font-family: var(--font-display); font-style: italic; font-weight: 500;">EB Garamond</div>
    <div class="meta">Old-Style · 16th-c. revival</div>
    <div class="specimen" style="font-family: var(--font-display); font-size: 17px;">The quick brown fox leaps.<br><em>Italic for the quiet emphasis.</em></div>
  </div>
  <div class="col">
    <div class="tag">body · sans</div>
    <div class="name" style="font-family: var(--font-body); font-weight: 500;">Work Sans</div>
    <div class="meta">Humanist · warm, readable</div>
    <div class="specimen" style="font-family: var(--font-body); font-size: 14px;">The quick brown fox leaps over the lazy dog. 0123456789.</div>
  </div>
</body>
</html>
