<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css?v=4">
<style>
  body { padding: 26px 30px; display: flex; flex-direction: column; gap: 18px; }
  .tag { font-family: var(--font-body); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-subtle); margin-bottom: 10px; }
  .sub { font-family: var(--font-display); font-style: italic; font-size: 12px; color: var(--fg-subtle); margin-left: 8px; }
  .row { display:flex; gap:14px; align-items: flex-end; }
  .tile { width: 88px; height: 50px; background: var(--bg-raised); border: 1px solid var(--rule); display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .rule-sample { width: 240px; height: 1px; background: var(--rule); }
  .rule-strong { width: 240px; height: 1px; background: var(--rule-strong); }
  .shadow-tile { background: var(--bg); border: 1px solid var(--rule); }
</style>
</head>
<body>
  <div>
    <div class="tag">Radii <span class="sub">— keep small. sharp is on-brand.</span></div>
    <div class="row">
      <div class="tile" style="border-radius:0">none · 0</div>
      <div class="tile" style="border-radius:2px">sm · 2px</div>
      <div class="tile" style="border-radius:3px">md · 3px</div>
      <div class="tile" style="border-radius:999px; color: var(--fg-subtle)">pill · avoid</div>
    </div>
  </div>
  <div>
    <div class="tag">Rules <span class="sub">— hairline is the default divider.</span></div>
    <div class="row" style="align-items:center; gap: 30px;">
      <div><div class="rule-sample"></div><div style="font-family: var(--font-mono); font-size:10px; color: var(--fg-subtle); margin-top:6px">--rule · marble-300</div></div>
      <div><div class="rule-strong"></div><div style="font-family: var(--font-mono); font-size:10px; color: var(--fg-subtle); margin-top:6px">--rule-strong · stone-500</div></div>
    </div>
  </div>
  <div>
    <div class="tag">Shadows <span class="sub">— almost none. focus ring is aegean.</span></div>
    <div class="row">
      <div class="shadow-tile" style="width:120px; height:50px; box-shadow: 0 1px 0 0 #ddd5c5; padding: 8px; font-family: var(--font-mono); font-size:10px; color:var(--fg-muted)">shadow-sm</div>
      <div class="shadow-tile" style="width:120px; height:50px; box-shadow: 0 1px 2px 0 rgba(42,38,32,.06); padding: 8px; font-family: var(--font-mono); font-size:10px; color:var(--fg-muted)">shadow-md</div>
      <div class="shadow-tile" style="width:120px; height:50px; box-shadow: 0 0 0 3px rgba(74,102,112,.28); padding: 8px; font-family: var(--font-mono); font-size:10px; color:var(--fg-muted)">shadow-focus · aegean</div>
    </div>
  </div>
</body>
</html>
