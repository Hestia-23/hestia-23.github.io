<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>hestia · portfolio ui kit</title>
<link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../../colors_and_type.css?v=4">
<style>
  body {
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
  }
  #root { width: 100%; max-width: var(--page-max); padding: 0 var(--space-6); box-sizing: border-box; }
  @media (max-width: 640px) { #root { padding: 0 var(--space-5); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Portfolio UI kit">
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Projects.jsx"></script>
  <script type="text/babel" src="Home.jsx"></script>
  <script type="text/babel" src="AboutContact.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroScale": 1.0,
      "useOrnament": true,
      "useOchreTag": true
    }/*EDITMODE-END*/;

    const PROJECTS = [
      { slug: "privacypack",         title: "privacypack",         emdash: "your privacy wins, in one card", date: "april 2026",    desc: "a single readable card of your privacy choices. static site, no javascript, printable.", stack: ["astro", "typescript"], status: "active" },
      { slug: "hearth-ui",           title: "hearth-ui",           emdash: "ui components, slowly",          date: "march 2026",    desc: "a small component library for privacy-focused community platforms. vanilla css, no framework lock-in.", stack: ["astro", "css"], status: "in progress" },
      { slug: "discord-alternatives",title: "discord-alternatives",emdash: "a neutral directory",            date: "january 2026",  desc: "a filterable directory of discord alternatives. no rankings, no reviews, no ads, no tracking.", stack: ["astro"], status: null },
      { slug: "sdv-summary",         title: "sdv-summary",         emdash: null,                             date: "autumn 2025",   desc: "a summary view of a stardew valley save file. community fork, maintained quietly.", stack: ["python", "jinja"], status: null },
      { slug: "scrapbook",           title: "scrapbook",           emdash: "a thinking log",                 date: "ongoing",       desc: "a public notebook of decisions and dead ends from the work above. written as work happens, not after.", stack: ["markdown"], status: null },
    ];

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [page, setPage] = React.useState("home");
      const [openSlug, setOpenSlug] = React.useState(null);

      const nav = (p) => { setOpenSlug(null); setPage(p); };
      const open = (slug) => { setOpenSlug(slug); setPage("project"); };
      const back = () => { setOpenSlug(null); setPage("projects"); };
      const current = PROJECTS.find(p => p.slug === openSlug);

      return (
        <React.Fragment>
          <Nav page={page === "project" ? "projects" : page} onNav={nav} />
          <main style={{ fontSize: `${t.heroScale === 1 ? 16 : 16 * t.heroScale}px` }}>
            {page === "home"     && <HomePage projects={PROJECTS} onNav={nav} onOpen={open} heroScale={t.heroScale} showOchreTag={t.useOchreTag} />}
            {page === "projects" && <ProjectsPage projects={PROJECTS} onOpen={open} showOchreTag={t.useOchreTag} />}
            {page === "about"    && <AboutPage />}
            {page === "contact"  && <ContactPage />}
            {page === "project"  && <ProjectDetail project={current} onBack={back} />}
          </main>
          {t.useOrnament && <Footer />}
          {!t.useOrnament && <footer style={{ marginTop: 128, paddingTop: 40, paddingBottom: 40, borderTop: "1px solid var(--rule)", textAlign: "center", fontFamily: "var(--font-display)", fontStyle: "italic", fontSize: 13, color: "var(--fg-subtle)" }}>built with astro. hosted on github pages. · mmxxvi</footer>}

          <TweaksPanel title="Tweaks">
            <TweakSection title="Hero">
              <TweakSlider label="Wordmark scale" value={t.heroScale} min={0.7} max={1.4} step={0.05} onChange={(v) => setTweak("heroScale", v)} />
            </TweakSection>
            <TweakSection title="Ornament">
              <TweakToggle label="Greek-key footer" value={t.useOrnament} onChange={(v) => setTweak("useOrnament", v)} />
              <TweakToggle label="Ochre status tag" value={t.useOchreTag} onChange={(v) => setTweak("useOchreTag", v)} />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
